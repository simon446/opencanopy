name: Docs build & publish

# Builds a browsable documentation site from docs/ and publishes it to GitHub Pages on main
# (spec §14.3 documentation requirements). On PRs it builds only, as a gate that the docs render.
# If the Documentation track later commits an mkdocs.yml, that config is used as-is; otherwise a
# minimal config is generated on the fly so the workflow works before site config is owned.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "mechanical/cad/opencanopy_tabletop_pepper_v1_block_model.scad"
      # Rebuild the published Rust API docs when the host-doc'able firmware crates change.
      - "firmware/control/**"
      - "firmware/sim/**"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "mechanical/cad/opencanopy_tabletop_pepper_v1_block_model.scad"
      - "firmware/control/**"
      - "firmware/sim/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install --quiet mkdocs mkdocs-material

      - name: Render images + 3D GLB (best-effort)
        # Best-effort refresh: export each OpenSCAD part (CGAL, headless), render the
        # assembly from many angles with VTK (z-buffered, labelled) and write the colour
        # GLB for the docs <model-viewer>. The committed PNGs + GLB publish as-is if this hiccups.
        continue-on-error: true
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq openscad
          pip install --quiet numpy trimesh vtk-osmesa
          python mechanical/cad/render_block.py

      - name: Generate fallback mkdocs.yml if none committed
        shell: bash
        run: |
          set -euo pipefail
          if [ -f mkdocs.yml ]; then
            echo "Using committed mkdocs.yml"
          else
            echo "No mkdocs.yml — generating a minimal fallback config."
            cat > mkdocs.yml <<'YAML'
          site_name: OpenCanopy Documentation
          site_description: Tabletop automated pepper grower — open hardware
          theme:
            name: material
          docs_dir: docs
          use_directory_urls: false
          YAML
          fi

      - name: Build
        run: mkdocs build --site-dir _site

      # ---- Firmware API docs (cargo doc) published under /api ----
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build firmware API docs (control + sim)
        working-directory: firmware
        # Host-doc'able crates only; the controller crate is esp-hal/Xtensa-only. --no-deps keeps it
        # to our own crates. rustdoc emits relative links, so the site works served under /api/.
        run: cargo doc --no-deps -p control -p sim

      - name: Stage API docs into the site under /api
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/api
          cp -r firmware/target/doc/. _site/api/
          # Landing page: /api/ -> the control crate index.
          cat > _site/api/index.html <<'HTML'
          <!doctype html>
          <html lang="en"><head><meta charset="utf-8">
          <title>OpenCanopy firmware API docs</title>
          <meta http-equiv="refresh" content="0; url=control/index.html"></head>
          <body><a href="control/index.html">OpenCanopy firmware API documentation</a></body></html>
          HTML

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
