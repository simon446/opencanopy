name: CI

# Quality gates for every PR and push to main (spec §10.5).
# Jobs are written to be tolerant of tracks that have not landed yet: where an artifact does not
# exist (no firmware build system, no BOM, no STLs), the step emits a NOTICE and passes; once the
# artifact exists, the same step runs for real and fails the PR on a regression.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Docs — markdown lint + link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !plan

      - name: Docs link / reference check
        uses: lycheeverse/lychee-action@v2
        with:
          # --offline validates local/relative links between docs; remote URLs are skipped here
          # (they are placeholders until the public repo exists). .lycheeignore excludes plan/.
          args: --offline --no-progress --include-fragments "**/*.md"
          fail: true

  firmware:
    name: Firmware — rustfmt, clippy, host unit + sim tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Rust workspace
        id: detect
        shell: bash
        run: |
          if [ -f firmware/Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "NOTICE: no firmware Cargo workspace yet — skipping (added by the Firmware track, WI-FW-01)."
          fi

      # Host gates use stable Rust only. The control + sim crates are no_std/host-testable and must not
      # depend on esp-hal, so the Xtensa toolchain is NOT needed here (spec §9.2, §10.1). On-target
      # cross-compilation of the controller binary is the separate, optional `firmware-target` job.
      - name: Install stable Rust (rustfmt, clippy)
        if: steps.detect.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        if: steps.detect.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware

      - name: Formatting check (cargo fmt)
        if: steps.detect.outputs.present == 'true'
        working-directory: firmware
        run: cargo fmt --all --check

      - name: Lints / static analysis (cargo clippy)
        if: steps.detect.outputs.present == 'true'
        working-directory: firmware
        run: cargo clippy -p control -p sim --all-targets -- -D warnings

      - name: Host unit tests + simulation scenarios (cargo test)
        if: steps.detect.outputs.present == 'true'
        working-directory: firmware
        run: cargo test -p control -p sim

  firmware-target:
    name: Firmware — ESP32-S3 cross-compile (esp-hal)
    runs-on: ubuntu-latest
    # Installing the Espressif Xtensa Rust channel is heavy (~5 min), so only run the cross-compile
    # when the controller crate actually changes (or on a manual dispatch). Non-blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Filter — did controller/ change?
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            controller:
              - 'firmware/controller/**'
              - '.github/workflows/ci.yml'
      - name: Detect controller crate
        id: detect
        # Build only when controller/ changed, or when manually dispatched.
        if: steps.changes.outputs.controller == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [ -f firmware/controller/Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "NOTICE: no controller crate yet — skipping ESP32-S3 cross-compile."
          fi
      - name: Install Xtensa (ESP32-S3) Rust toolchain
        if: steps.detect.outputs.present == 'true'
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
      # controller/ is a STANDALONE package (excluded from the host workspace) so the host job never
      # resolves esp-hal/esp-wifi. Build it from its own directory; the target + esp toolchain come
      # from controller/.cargo/config.toml and controller/rust-toolchain.toml.
      - name: Build controller for xtensa-esp32s3-none-elf
        if: steps.detect.outputs.present == 'true'
        working-directory: firmware/controller
        run: cargo build --release

  emulator-smoke:
    name: Firmware — ESP32-S3 emulator smoke test (Wokwi)
    runs-on: ubuntu-latest
    # MANUAL ONLY: this job installs the Xtensa toolchain, builds the firmware, and runs a Wokwi
    # cloud simulation — too expensive to run on every push. Trigger on demand from the Actions tab
    # ("Run workflow") or `gh workflow run ci.yml`. It runs the real firmware binary on emulated
    # silicon as a boot/loop smoke test (complements the host unit tests + sim); full signal
    # fidelity stays with HIL (WI-EE-08). Self-skips if WOKWI_CLI_TOKEN is not configured.
    if: github.event_name == 'workflow_dispatch'
    env:
      WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect emulator build + token
        id: detect
        shell: bash
        run: |
          if [ -f firmware/controller/src/emulator.rs ] && [ -f firmware/controller/wokwi/wokwi.toml ] && [ -n "${WOKWI_CLI_TOKEN:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "NOTICE: emulator project missing or WOKWI_CLI_TOKEN unset — skipping smoke test."
          fi
      - name: Install Xtensa (ESP32-S3) Rust toolchain
        if: steps.detect.outputs.present == 'true'
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
      - name: Build emulator firmware
        if: steps.detect.outputs.present == 'true'
        working-directory: firmware/controller
        run: cargo build --release --features emulator
      # Official Wokwi CI action handles wokwi-cli install + invocation robustly (vs a manual curl).
      - name: Wokwi smoke test
        if: steps.detect.outputs.present == 'true'
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: firmware/controller/wokwi
          timeout: 60000
          scenario: scenario.yaml
          expect_text: 'REAL-DRIVER SMOKE TEST COMPLETE'
          fail_text: 'panicked'
          serial_log_file: ${{ github.workspace }}/wokwi-serial.log
      # Always surface whatever the firmware printed over serial, so a timeout is diagnosable.
      - name: Dump emulator serial log
        if: steps.detect.outputs.present == 'true' && always()
        shell: bash
        run: |
          echo "----- wokwi serial output -----"
          cat "${GITHUB_WORKSPACE}/wokwi-serial.log" 2>/dev/null || echo "(no serial log captured)"
          echo "----- end serial output -----"

  bom:
    name: BOM — §16.3 grow-light gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: BOM checker self-test (proves the gate works)
        run: python3 scripts/bom_check.py --selftest
      - name: Validate electronics BOM (if present)
        run: python3 scripts/bom_check.py
      - name: Controller netlist ERC + BOM coverage (schematic-as-data, WI-EE-03)
        # Plain-Python ERC stand-in until the KiCad schematic lands (then the eda job's
        # `kicad-cli sch erc` supersedes it). Enforces: no floating nets, no double-driven
        # pins, fail-OFF pump gate, fan parts DNP, and that every populated part is in the BOM.
        run: python3 electronics/pcb/netlist/controller_netlist.py --selftest

  mechanical:
    name: Mechanical — CAD presence + STL manifold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: CAD file presence check
        shell: bash
        run: |
          set -euo pipefail
          stls=$(find mechanical/stl -name '*.stl' 2>/dev/null | wc -l | tr -d ' ')
          sources=$(find mechanical/cad/source mechanical/cad/step -type f \
            ! -name '.gitkeep' 2>/dev/null | wc -l | tr -d ' ')
          echo "Released STLs: $stls, CAD source/STEP files: $sources"
          if [ "$stls" -gt 0 ] && [ "$sources" -eq 0 ]; then
            echo "ERROR: STLs are present but no CAD source/STEP exists — releases must ship editable source."
            exit 1
          fi
          if [ "$stls" -eq 0 ] && [ "$sources" -eq 0 ]; then
            echo "NOTICE: no CAD/STL artifacts yet (produced by the Mechanical track)."
          fi
      - name: STL manifold check
        run: python3 scripts/stl_check.py --dir mechanical/stl

  eda:
    name: Electronics — ERC / DRC (if EDA project present)
    runs-on: ubuntu-latest
    # Coordinated with the Electronics track; non-blocking until a KiCad project lands and the
    # team opts this into required checks.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Detect KiCad project
        id: detect
        shell: bash
        run: |
          if find electronics/pcb/kicad -name '*.kicad_sch' -o -name '*.kicad_pcb' 2>/dev/null | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "NOTICE: no KiCad project yet — skipping ERC/DRC. Interim electrical-rule check"
            echo "        runs in the 'BOM' job (controller_netlist.py --selftest); the KiCad"
            echo "        schematic is entered by importing electronics/pcb/netlist/controller.net."
          fi
      - name: Install KiCad CLI
        if: steps.detect.outputs.present == 'true'
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-9.0-releases
          sudo apt-get update -qq && sudo apt-get install -y -qq kicad
      - name: Schematic ERC
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for f in $(find electronics/pcb/kicad -name '*.kicad_sch'); do
            kicad-cli sch erc --exit-code-violations "$f"
          done
      - name: PCB DRC
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for f in $(find electronics/pcb/kicad -name '*.kicad_pcb'); do
            kicad-cli pcb drc --exit-code-violations "$f"
          done
