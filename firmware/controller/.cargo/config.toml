# Controller-local cargo config: building from this directory targets the ESP32-S3 by default and
# flashes/monitors with espflash. (The workspace-root config intentionally does NOT force a target,
# so host tests stay on stable Rust; this local config applies only to the on-target binary.)
[target.xtensa-esp32s3-none-elf]
runner = "espflash flash --monitor"
rustflags = [
  # esp-hal's linker script: defines the ESP32-S3 memory map and PROVIDEs the ROM/peripheral and
  # interrupt-vector symbols (USB_DEVICE, ASSIST_DEBUG, FROM_CPU_INTR*, *_PMS, ...). Required to link.
  "-C", "link-arg=-Tlinkall.x",
  "-C", "link-arg=-nostartfiles",
]

[build]
target = "xtensa-esp32s3-none-elf"

# The Espressif Rust channel builds `core`/`alloc` from source for the Xtensa target (no prebuilt
# std component is shipped for xtensa-esp32s3-none-elf), so build-std is required.
[unstable]
build-std = ["core", "alloc"]

[env]
ESP_LOG = "info"
